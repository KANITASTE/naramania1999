<!DOCTYPE HTML>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nara-mania チャット</title>
<style>
* { box-sizing: border-box; }
body {
  background: #000066;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  font-family: "MS Gothic", "ＭＳ ゴシック", monospace;
}
.chat-outer {
  width: 640px;
  max-width: 98vw;
}
.chat-titlebar {
  background: linear-gradient(to right, #000099, #3333CC);
  color: white;
  padding: 4px 8px;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 2px outset #6666FF;
  border-bottom: none;
  cursor: default;
  user-select: none;
}
.chat-titlebar-btns span {
  display: inline-block;
  width: 14px;
  height: 14px;
  background: #AAAAFF;
  border: 1px outset #CCCCFF;
  margin-left: 2px;
  text-align: center;
  line-height: 13px;
  font-size: 10px;
  color: #000033;
  cursor: pointer;
}
.chat-main {
  background: #CCCCFF;
  border: 2px outset #9999FF;
  border-top: none;
  padding: 4px;
}
.chat-toolbar {
  background: #AAAAEE;
  border: 1px outset #CCCCFF;
  padding: 2px 6px;
  margin-bottom: 4px;
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 11px;
}
.chat-toolbar .room-label {
  color: #000033;
  font-weight: bold;
}
.chat-toolbar select {
  font-family: inherit;
  font-size: 11px;
  border: 1px inset #9999FF;
  background: #EEEEFC;
  padding: 1px 2px;
}
.chat-body {
  display: flex;
  gap: 4px;
  height: 340px;
}
.chat-messages {
  flex: 1;
  background: #FFFFFF;
  border: 2px inset #9999FF;
  padding: 4px 6px;
  overflow-y: auto;
  font-size: 12px;
}
.chat-userlist {
  width: 100px;
  background: #DDDDFF;
  border: 2px inset #9999FF;
  padding: 4px;
  font-size: 11px;
  overflow-y: auto;
}
.chat-userlist-title {
  background: #6666CC;
  color: white;
  padding: 2px 4px;
  margin: -4px -4px 4px;
  font-size: 10px;
  font-weight: bold;
  text-align: center;
}
.online-user {
  padding: 2px 0;
  color: #000066;
  cursor: default;
}
.online-user::before { content: "▶ "; color: #006600; font-size: 10px; }
.msg {
  margin: 2px 0;
  line-height: 1.5;
  word-break: break-all;
}
.msg-system {
  color: #666699;
  font-style: italic;
  font-size: 11px;
}
.msg-name {
  font-weight: bold;
}
.msg-name.self { color: #CC0000; }
.msg-name.other { color: #0000CC; }
.msg-name.bot { color: #006600; }
.msg-time {
  color: #999999;
  font-size: 10px;
}
.chat-input-row {
  background: #BBBBEE;
  border: 1px outset #CCCCFF;
  padding: 3px 4px;
  margin-top: 4px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.chat-input-row label {
  font-size: 11px;
  color: #000033;
  white-space: nowrap;
}
.chat-input-row input[type="text"] {
  flex: 1;
  font-family: inherit;
  font-size: 12px;
  border: 2px inset #9999FF;
  background: #FFFFF8;
  padding: 2px 4px;
}
.chat-btn {
  background: #8888CC;
  color: white;
  border: 2px outset #BBBBFF;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  font-weight: bold;
  padding: 2px 8px;
  white-space: nowrap;
}
.chat-btn:active { border-style: inset; }
.chat-name-row {
  background: #CCCCEE;
  border: 1px outset #CCCCFF;
  padding: 2px 4px;
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  margin-top: 2px;
}
.chat-name-row input {
  width: 120px;
  font-family: inherit;
  font-size: 11px;
  border: 2px inset #9999FF;
  background: #FFFFF8;
  padding: 1px 3px;
}
.statusbar {
  background: #AAAADD;
  border: 1px inset #8888BB;
  padding: 2px 6px;
  font-size: 10px;
  color: #000033;
  margin-top: 2px;
}
.back-link {
  text-align: center;
  margin-top: 8px;
}
.back-link a {
  color: #AAAAFF;
  font-size: 12px;
}
</style>
</head>
<body>
<div class="chat-outer">
  <div class="chat-titlebar">
    <span>💬 nara-mania チャットルーム</span>
    <div class="chat-titlebar-btns">
      <span title="最小化">_</span>
      <span title="最大化">□</span>
      <span title="閉じる">×</span>
    </div>
  </div>
  <div class="chat-main">
    <div class="chat-toolbar">
      <span class="room-label">ルーム：</span>
      <select id="room-select" onchange="changeRoom(this.value)">
        <option value="nara">🦌 奈良雑談</option>
        <option value="temple">🏯 寺社仏閣</option>
        <option value="food">🍱 奈良グルメ</option>
      </select>
      <span style="color:#006600; font-weight:bold; margin-left:auto;" id="online-count">接続中: 3人</span>
    </div>
    <div class="chat-body">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-userlist">
        <div class="chat-userlist-title">参加者</div>
        <div id="user-list"></div>
      </div>
    </div>
    <div class="chat-name-row">
      <label>ニックネーム：</label>
      <input type="text" id="nick-input" value="奈良好き" maxlength="15">
      <button class="chat-btn" onclick="setNick()">変更</button>
    </div>
    <div class="chat-input-row">
      <label>発言：</label>
      <input type="text" id="msg-input" placeholder="ここに入力してEnterまたは送信ボタン" maxlength="200"
             onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="chat-btn" onclick="sendMsg()">送信</button>
    </div>
    <div class="statusbar" id="statusbar">接続済み | nara-mania チャット 2000</div>
  </div>
  <div class="back-link"><a href="index.html">← nara-maniaトップへ</a></div>
</div>

<script>
let myNick = '奈良好き';
let room = 'nara';
const messages = [];
let botTimer;

const BOTS = {
  nara: [
    {name:'鹿せんべい', msg:'今日も奈良公園に鹿せんべい売ってましたよ〜'},
    {name:'おだしー', msg:'法隆寺の七不思議、みなさん知ってますか？'},
    {name:'ならまち猫', msg:'ならまちを散歩してきました。格子の家が素敵〜'},
    {name:'古都愛好家', msg:'東大寺の大仏は奈良時代からずっとそこにあるんですよね・・・ロマン'},
    {name:'山の辺ウォーカー', msg:'山の辺の道を完歩しました！足が痛い笑'},
  ],
  temple: [
    {name:'朱印コレクター', msg:'室生寺の朱印、字がとても綺麗でした'},
    {name:'お寺博士', msg:'唐招提寺のうちわまき、今年は行けたかな？'},
    {name:'仏像ファン', msg:'三月堂の仏像は本当に素晴らしい・・・何度見ても飽きない'},
  ],
  food: [
    {name:'柿の葉寿司', msg:'近鉄で食べる柿の葉寿司は格別！'},
    {name:'ゆべし好き', msg:'十津川のゆべし、甘くておいしいですよね'},
    {name:'みたらし団子', msg:'猿沢池のそばでみたらし団子食べました'},
  ]
};

const USERS = {
  nara: ['おだしー（管理人）','鹿せんべい','ならまち猫','古都愛好家'],
  temple: ['朱印コレクター','お寺博士','仏像ファン'],
  food: ['柿の葉寿司','ゆべし好き','みたらし団子']
};

function getTime() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function addMsg(name, text, type='other') {
  const div = document.createElement('div');
  div.className = 'msg';
  if (type === 'system') {
    div.className = 'msg msg-system';
    div.textContent = `--- ${text} ---`;
  } else {
    div.innerHTML = `<span class="msg-time">[${getTime()}]</span> <span class="msg-name ${type}">${escHtml(name)}：</span>${escHtml(text)}`;
  }
  const container = document.getElementById('chat-messages');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  messages.push({name, text, type, time: getTime()});
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderUsers() {
  const list = USERS[room] || [];
  const allUsers = [myNick, ...list.filter(u => u !== myNick)];
  document.getElementById('user-list').innerHTML = allUsers.map(u =>
    `<div class="online-user">${escHtml(u)}</div>`
  ).join('');
  document.getElementById('online-count').textContent = `接続中: ${allUsers.length}人`;
}

function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  addMsg(myNick, text, 'self');
  input.value = '';
  input.focus();
  // ボットが時々返答
  if (Math.random() < 0.4) {
    setTimeout(botReply, 1500 + Math.random() * 2000);
  }
}

function botReply() {
  const bots = BOTS[room] || BOTS.nara;
  const bot = bots[Math.floor(Math.random() * bots.length)];
  addMsg(bot.name, bot.msg, 'bot');
}

function setNick() {
  const newNick = document.getElementById('nick-input').value.trim();
  if (!newNick) return;
  addMsg('', `${myNick} が ${newNick} に名前を変更しました`, 'system');
  myNick = newNick;
  renderUsers();
}

function changeRoom(newRoom) {
  room = newRoom;
  const roomNames = {nara:'奈良雑談', temple:'寺社仏閣', food:'奈良グルメ'};
  document.getElementById('chat-messages').innerHTML = '';
  addMsg('', `${roomNames[room]}ルームに入室しました`, 'system');
  renderUsers();
  // ウェルカムボット
  setTimeout(() => {
    const bots = BOTS[room] || BOTS.nara;
    const bot = bots[Math.floor(Math.random() * bots.length)];
    addMsg(bot.name, bot.msg, 'bot');
  }, 1000);
}

// 定期的にボットがつぶやく
function startBotTimer() {
  if (botTimer) clearInterval(botTimer);
  botTimer = setInterval(() => {
    if (Math.random() < 0.3) botReply();
  }, 15000);
}

// 初期化
addMsg('', 'nara-mania チャットルームへようこそ！', 'system');
addMsg('', '奈良についておしゃべりしましょう（＾＾）', 'system');
setTimeout(() => {
  const bots = BOTS[room];
  addMsg(bots[0].name, bots[0].msg, 'bot');
}, 1000);
setTimeout(() => {
  const bots = BOTS[room];
  addMsg(bots[1].name, bots[1].msg, 'bot');
}, 3000);
renderUsers();
startBotTimer();
</script>
</body>
</html>
